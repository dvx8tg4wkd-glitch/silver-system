            font-size: 16px;
            cursor: pointer;
            transition: opacity 0.2s;

        .chart-container {

            margin: 0 auto;
            background: white;

            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.1);

    <script>
        function showChart(id) {
            // 先隐藏所有图片
            document.querySelectorAll('.chart-container').forEach(el => {
                el.style.display = 'none';
            });
            // 显示当前点击的图片
            document.getElementById(id).style.display = 'block';
        }
    </script>
