<!DOCTYPE html>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2025年耐药数据</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }
        body {
            background-color: #f5f7fa;
            padding: 20px;
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        .header h1 {
            color: #333;
            font-size: 28px;
        }
        .button-group {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            margin-bottom: 30px;
        }
        .menu-btn {
            background-color: #1677ff;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .menu-btn:hover {
            opacity: 0.8;
        }
        .chart-container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.1);
            display: none;
        }
        .chart-img {
            width: 100%;
            border-radius: 8px;
        }
    </style>

<body>
    <div class="header">
        <h1>💊 2025年耐药数据</h1>
    </div>

    <div class="button-group">
        <button class="menu-btn" onclick="showChart('chart1')">全院情况</button>
        <button class="menu-btn" onclick="showChart('chart2')">标本类型及耐药情况</button>
        <button class="menu-btn" onclick="showChart('chart3')">各科室病原菌及耐药情况</button>
        <button class="menu-btn" onclick="showChart('chart4')">真菌耐药情况</button>
        <button class="menu-btn" onclick="showChart('chart5')">标本送检质量情况</button>
        <button class="menu-btn" onclick="showChart('chart6')">多重耐药变迁情况</button>
        <button class="menu-btn" onclick="showChart('chart7')">细菌真菌天然耐药表情况</button>
    </div>

    <!-- 图片显示区域 -->
    <div id="chart1" class="chart-container">
        <img class="chart-img" src="https://你的图片地址1.png" alt="全院情况">
    </div>
    <div id="chart2" class="chart-container">
        <img class="chart-img" src="https://你的图片地址2.png" alt="标本类型及耐药情况">
    </div>
    <div id="chart3" class="chart-container">
        <img class="chart-img" src="https://你的图片地址3.png" alt="各科室病原菌及耐药情况">
    </div>
    <div id="chart4" class="chart-container">
        <img class="chart-img" src="https://你的图片地址4.png" alt="真菌耐药情况">
    </div>
    <div id="chart5" class="chart-container">
        <img class="chart-img" src="https://你的图片地址5.png" alt="标本送检质量情况">
    </div>
    <div id="chart6" class="chart-container">
        <img class="chart-img" src="https://你的图片地址6.png" alt="多重耐药变迁情况">
    </div>
    <div id="chart7" class="chart-container">
        <img class="chart-img" src="https://你的图片地址7.png" alt="细菌真菌天然耐药表情况">
    </div>

    <script>
        function showChart(id) {
            // 先隐藏所有图片
            document.querySelectorAll('.chart-container').forEach(el => {
                el.style.display = 'none';
            });
            // 显示当前点击的图片
            document.getElementById(id).style.display = 'block';
        }
    </script>
</body>
</html>
